services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-accounts-pg
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
      POSTGRES_DB: accounts
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fintech -d accounts']
      interval: 5s
      timeout: 5s
      retries: 5
